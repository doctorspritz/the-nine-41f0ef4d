<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Simon & Steph</title>
<style>
  :root{--paper:#f6f3ec;--ink:#23201b;--muted:#6b6457;--line:#e2dccf;--card:#fffdf8;--gold:#b8893b;--steph:#c45b54;--simon:#2f6f74}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);display:flex;align-items:center;justify-content:center;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;padding:24px}
  .gate{width:100%;max-width:380px;text-align:center}
  .lock{width:54px;height:54px;border-radius:50%;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--simon),var(--steph));color:#fff;font-size:24px}
  h1{font-size:30px;margin:0 0 6px;font-weight:600;letter-spacing:-.01em}
  h1 .amp{color:var(--gold);font-style:italic;padding:0 .1em}
  p.sub{font-family:ui-sans-serif,-apple-system,sans-serif;font-size:13.5px;color:var(--muted);margin:0 0 26px}
  form{display:flex;flex-direction:column;gap:12px}
  input{font-family:ui-sans-serif,-apple-system,sans-serif;font-size:16px;padding:14px 16px;border:1px solid var(--line);
    border-radius:12px;background:var(--card);color:var(--ink);text-align:center;outline:none}
  input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,137,59,.15)}
  button{font-family:ui-sans-serif,-apple-system,sans-serif;font-size:15px;font-weight:600;padding:14px 16px;border:none;
    border-radius:12px;background:var(--ink);color:var(--paper);cursor:pointer;transition:opacity .15s}
  button:hover{opacity:.88} button:disabled{opacity:.5;cursor:default}
  .err{font-family:ui-sans-serif,sans-serif;font-size:13px;color:var(--steph);min-height:18px;margin-top:4px}
  .foot{font-family:ui-sans-serif,sans-serif;font-size:11px;color:var(--muted);margin-top:26px;line-height:1.5}
</style>
</head>
<body>

      <button id="b" type="submit">Unlock</button>
      <div class="err" id="e"></div>
    </form>
